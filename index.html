<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการเอกสารคุณภาพ | JVL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .sidebar { transition: all 0.3s ease; }
        .sidebar.collapsed { width: 80px; }
        .z-important { position: relative; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .leading-zero-fix { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="text-slate-800">

    <div id="loader" class="fixed inset-0 bg-white/80 z-[100] hidden flex items-center justify-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600"></div>
    </div>

    <div id="authPage" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#003366] via-[#005599] to-[#008855] p-4">
        <div class="glass p-10 rounded-3xl shadow-2xl w-full max-w-md z-important border border-white/20 relative overflow-hidden">
            
            <div class="text-center mb-8">
                <img src="https://www.rploei.go.th/ec2/wp-content/uploads/2017/08/cropped-cropped-cropped-3.png" alt="โลโก้ รพ.จิตเวชเลยราชนครินทร์" class="mx-auto h-24 object-contain mb-4 drop-shadow-md">
                <h1 class="text-2xl font-bold text-slate-800">ระบบเอกสารคุณภาพ</h1>
                <p class="text-slate-500">รพ.จิตเวชเลยราชนครินทร์</p>
            </div>

            <div id="loginFormContainer" class="transition-all duration-300">
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Username</label>
                        <input type="text" id="loginUsername" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Password</label>
                        <input type="password" id="loginPassword" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-[#003366] text-white py-3 rounded-xl font-semibold shadow-lg hover:bg-blue-800 transition-all active:scale-95">เข้าสู่ระบบ</button>
                    <div class="text-center mt-4 flex justify-center space-x-2 text-sm">
                        <button type="button" onclick="toggleAuthForm('register')" class="text-blue-600 hover:underline">สมัครใช้งาน</button>
                        <span class="text-slate-300">|</span>
                        <button type="button" onclick="toggleAuthForm('forgot')" class="text-slate-500 hover:underline">ลืมรหัสผ่าน?</button>
                    </div>
                </form>
            </div>

            <div id="registerFormContainer" class="hidden transition-all duration-300">
                <h2 class="text-lg font-bold text-center mb-4 text-[#003366]">สมัครสมาชิกใหม่</h2>
                <form id="registerForm" class="space-y-3">
                    <input type="text" id="regUsername" placeholder="Username ที่ต้องการ" required class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="password" id="regPassword" placeholder="Password" required class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="text" id="regFullName" placeholder="ชื่อ - นามสกุล" required class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="text" id="regDepartment" placeholder="สังกัด/ฝ่าย" required class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="email" id="regEmail" placeholder="อีเมล (สำหรับกู้รหัสผ่าน)" required class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    
                    <div class="flex items-start mt-2">
                        <input type="checkbox" id="regPdpa" required class="mt-1 mr-2 cursor-pointer">
                        <label for="regPdpa" class="text-xs text-slate-500">ข้าพเจ้ายินยอมให้ประมวลผลข้อมูลส่วนบุคคล (PDPA) เพื่อใช้ในระบบนี้เท่านั้น</label>
                    </div>

                    <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold shadow-lg hover:bg-green-700 transition-all active:scale-95">ยืนยันการสมัคร</button>
                    <button type="button" onclick="toggleAuthForm('login')" class="w-full mt-2 text-sm text-slate-500 hover:underline">กลับไปหน้าเข้าสู่ระบบ</button>
                </form>
            </div>

            <div id="forgotFormContainer" class="hidden transition-all duration-300">
                <h2 class="text-lg font-bold text-center mb-2 text-[#003366]">ลืมรหัสผ่าน</h2>
                <p class="text-xs text-center text-slate-500 mb-4">ระบบจะส่งรหัสผ่านใหม่ไปยังอีเมลของคุณ</p>
                <form id="forgotForm" class="space-y-4">
                    <input type="text" id="forgotUsername" placeholder="Username ของคุณ" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="email" id="forgotEmail" placeholder="อีเมลที่ลงทะเบียนไว้" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    <button type="submit" class="w-full bg-orange-500 text-white py-3 rounded-xl font-semibold shadow-lg hover:bg-orange-600 transition-all active:scale-95">ส่งรหัสผ่านใหม่</button>
                    <button type="button" onclick="toggleAuthForm('login')" class="w-full mt-2 text-sm text-slate-500 hover:underline">กลับไปหน้าเข้าสู่ระบบ</button>
                </form>
            </div>

        </div>
    </div>

    <div id="mainApp" class="hidden flex h-screen overflow-hidden">
        <aside id="sidebar" class="sidebar bg-[#003366] text-white w-64 flex-shrink-0 flex flex-col p-4 shadow-xl">
            <div class="flex items-center justify-between mb-10">
                <span class="font-bold text-xl truncate logo-text">JVL DOCUMENT</span>
                <button onclick="toggleSidebar()" class="p-2 hover:bg-white/10 rounded-lg"><i class="fas fa-bars"></i></button>
            </div>
            <nav class="flex-1 space-y-2">
                <a href="#" onclick="showSection('dashboard')" class="flex items-center space-x-3 p-3 rounded-xl bg-white/10 text-gold-400 border-l-4 border-yellow-400">
                    <i class="fas fa-chart-line w-6"></i> <span>Dashboard</span>
                </a>
                <a href="#" onclick="showSection('myDocs')" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-white/10 transition-all">
                    <i class="fas fa-file-alt w-6"></i> <span>เอกสารของฉัน</span>
                </a>
                <div id="adminMenu" class="hidden pt-4 border-t border-white/10">
                    <p class="text-xs text-white/40 mb-2 px-3 uppercase">Admin Only</p>
                    <a href="#" onclick="showSection('allDocs')" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-white/10 transition-all">
                        <i class="fas fa-database w-6"></i> <span>เอกสารทั้งหมด</span>
                    </a>
                    <a href="#" onclick="showSection('users')" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-white/10 transition-all">
                        <i class="fas fa-users w-6"></i> <span>จัดการผู้ใช้</span>
                    </a>
                </div>
            </nav>
            <div class="mt-auto p-4 bg-white/5 rounded-2xl">
                <p id="userDisplay" class="text-sm font-medium truncate">User Name</p>
                <button onclick="logout()" class="text-xs text-red-300 hover:text-red-100 mt-2 flex items-center">
                    <i class="fas fa-sign-out-alt mr-2"></i> ออกจากระบบ
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto bg-slate-50 p-8">
            <div id="section-dashboard" class="space-y-6">
                <h2 class="text-2xl font-bold text-slate-800">แผงควบคุมสถิติ</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-blue-500 hover:shadow-md transition-all">
                        <p class="text-slate-500 text-sm">เอกสารทั้งหมด</p>
                        <h3 id="statTotal" class="text-3xl font-bold">0</h3>
                    </div>
                    </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-3xl shadow-sm">
                        <canvas id="categoryChart"></canvas>
                    </div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm">
                        <h4 class="font-bold mb-4">5 รายการล่าสุด</h4>
                        <div id="recentDocsList" class="space-y-3"></div>
                    </div>
                </div>
            </div>
            </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwU2oEOBPODfTul2ibdemndeMB8ON15DNB38jcWypBtHmpVva1pVNZq0YHPTCivmE6N2w/exec"; // วาง URL ที่ได้จากขั้นตอน Deploy ที่นี่
        let currentUser = null;

        // ฟังก์ชัน Password Hashing ง่ายๆ (แนะนำให้ใช้ SHA-256 ในระบบจริง)
        async function hashString(str) {
            const msgUint8 = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            
            const pass = document.getElementById('password').value;
            const hashedPass = await hashString(pass); // ส่ง Password ที่ Hash แล้วไปตรวจที่หลังบ้าน

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        username: document.getElementById('username').value,
                        password: hashedPass
                    })
                });
                const result = await response.json();
                
                if (result.status === 'success') {
                    currentUser = result.user;
                    initApp();
                } else {
                    Swal.fire('ผิดพลาด', result.message, 'error');
                }
            } catch (err) {
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            } finally {
                loader.classList.add('hidden');
            }
        };

        function initApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = currentUser.fullName;
            if (currentUser.role === 'Admin') document.getElementById('adminMenu').classList.remove('hidden');
            loadDashboard();
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
            const logoText = sb.querySelector('.logo-text');
            logoText.classList.toggle('hidden');
        }

        async function loadDashboard() {
            // ดึงข้อมูลผ่าน fetch(API_URL, { action: 'getDashboard' })
            // แล้วนำมาวาดกราฟด้วย Chart.js และอัพเดทตารางรายการล่าสุด
        }

        // เพิ่มฟังก์ชันจัดการไฟล์และการบันทึกเอกสารที่นี่

// เพิ่ม/แก้ไข Script ส่วนนี้ครับ
    function toggleAuthForm(formType) {
        document.getElementById('loginFormContainer').classList.add('hidden');
        document.getElementById('registerFormContainer').classList.add('hidden');
        document.getElementById('forgotFormContainer').classList.add('hidden');
        
        if(formType === 'login') document.getElementById('loginFormContainer').classList.remove('hidden');
        if(formType === 'register') document.getElementById('registerFormContainer').classList.remove('hidden');
        if(formType === 'forgot') document.getElementById('forgotFormContainer').classList.remove('hidden');
    }

    // ฟังก์ชันจัดการสมัครสมาชิก
    document.getElementById('registerForm').onsubmit = async (e) => {
        e.preventDefault();
        const loader = document.getElementById('loader');
        loader.classList.remove('hidden');
        
        const pass = document.getElementById('regPassword').value;
        const hashedPass = await hashString(pass); // Hash รหัสผ่านก่อนส่ง

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'register',
                    username: document.getElementById('regUsername').value,
                    password: hashedPass,
                    fullName: document.getElementById('regFullName').value,
                    department: document.getElementById('regDepartment').value,
                    email: document.getElementById('regEmail').value,
                    pdpaConsent: new Date().toISOString()
                })
            });
            const result = await response.json();
            
            if (result.status === 'success') {
                Swal.fire('สำเร็จ', 'สมัครสมาชิกเรียบร้อยแล้ว กรุณาเข้าสู่ระบบ', 'success');
                toggleAuthForm('login');
                document.getElementById('registerForm').reset();
            } else {
                Swal.fire('ผิดพลาด', result.message, 'error');
            }
        } catch (err) {
            Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
        } finally {
            loader.classList.add('hidden');
        }
    };

    // ฟังก์ชันจัดการลืมรหัสผ่าน
    document.getElementById('forgotForm').onsubmit = async (e) => {
        e.preventDefault();
        const loader = document.getElementById('loader');
        loader.classList.remove('hidden');

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'forgotPassword',
                    username: document.getElementById('forgotUsername').value,
                    email: document.getElementById('forgotEmail').value
                })
            });
            const result = await response.json();
            
            if (result.status === 'success') {
                Swal.fire('ส่งสำเร็จ', 'ระบบได้ส่งรหัสผ่านใหม่ไปยังอีเมลของคุณแล้ว', 'success');
                toggleAuthForm('login');
                document.getElementById('forgotForm').reset();
            } else {
                Swal.fire('ผิดพลาด', result.message, 'error');
            }
        } catch (err) {
            Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
        } finally {
            loader.classList.add('hidden');
        }
    };

    // (แก้ไข ID ในส่วน Login เดิมให้ตรงกับ HTML ด้านบน)
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const loader = document.getElementById('loader');
        loader.classList.remove('hidden');
        
        const pass = document.getElementById('loginPassword').value; // เปลี่ยน ID
        const hashedPass = await hashString(pass); 

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'login',
                    username: document.getElementById('loginUsername').value, // เปลี่ยน ID
                    password: hashedPass
                })
            });
            const result = await response.json();
            
            if (result.status === 'success') {
                currentUser = result.user;
                initApp();
            } else {
                Swal.fire('ผิดพลาด', result.message, 'error');
            }
        } catch (err) {
            Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
        } finally {
            loader.classList.add('hidden');
        }
    };
        
    </script>
</body>
</html>
